<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="xGradLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="xGradRight" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00ff87"/>
      <stop offset="100%" stop-color="#00cc6a"/>
    </linearGradient>
    <filter id="glowBlue" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#3b82f6" flood-opacity="0.8"/>
    </filter>
    <filter id="glowGreen" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#00ff87" flood-opacity="0.8"/>
    </filter>
    <filter id="bgGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#3b82f6" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background square -->
  <rect x="10" y="10" width="100" height="100" rx="20" fill="#0a0a0a" stroke="#3b82f6" stroke-width="2" stroke-opacity="0.5" filter="url(#bgGlow)"/>

  <!-- Left diagonal stroke of X (blue gradient) -->
  <line x1="30" y1="28" x2="90" y2="92" stroke="url(#xGradLeft)" stroke-width="13" stroke-linecap="round" filter="url(#glowBlue)"/>

  <!-- Right diagonal stroke of X (green gradient) -->
  <line x1="90" y1="28" x2="30" y2="92" stroke="url(#xGradRight)" stroke-width="13" stroke-linecap="round" filter="url(#glowGreen)"/>
</svg>
